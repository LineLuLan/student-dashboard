<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Dashboard</title>
    <!-- <script src="https://d3js.org/d3.v7.min.js"></script> -->
    <script type="module" src="main.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<div id="tooltip" style="
    position:absolute;
    background:white;
    padding:8px 12px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
    font-size:13px;
    pointer-events:none;
    opacity:0;
"></div>


<body>
    <h1>Student Performance Dashboard</h1>

    <div class="controls">
        <label><input type="checkbox" value="low" checked> Low motivation</label>
        <label><input type="checkbox" value="medium" checked> Medium motivation</label>
        <label><input type="checkbox" value="high" checked> High motivation</label>
    </div>


    <div class="grid">
        <div class="card">
            <h2>Study vs Score</h2>
            <div class="chart">
                <div id="scatter"></div>
            </div>       
        </div>

        <div class="card">
            <h2>Top vs Bottom Students</h2>
            <div class="chart">
                <div id="behavior"></div>
            </div>
        </div>

        <div class="card">
            <h2>Environment Impact</h2>
            <div class="chart">
                <div id="environment"></div>
            </div>
        </div>

        <div class="card">
            <h2>Key Factors</h2>
            <div class="chart">
                <div id="importance"></div>
            </div>
        </div>
    </div>
</body>

</html>
