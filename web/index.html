<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Dashboard</title>
    <!-- <script src="https://d3js.org/d3.v7.min.js"></script> -->
    <script type="module" src="main.js"></script>
    <link rel="stylesheet" href="style.css">
</head>


<div id="tooltip" style="
    position:absolute;
    background:white;
    padding:8px 12px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
    font-size:13px;
    pointer-events:none;
    opacity:0;
"></div>

<body>
    
    <h1>Student Performance Dashboard</h1>

    <div class="controls">
        <label><input type="checkbox" value="low" checked> Low motivation</label>
        <label><input type="checkbox" value="medium" checked> Medium motivation</label>
        <label><input type="checkbox" value="high" checked> High motivation</label>
    </div>


    <div class="grid">
    
        <div class="card">
            <h2>Study vs Score</h2>
            <div class="card-body">
                <div class="chart-col">
                    <div id="scatter"></div>
                </div>
                <div class="info-col" id="scatter-info">
                    </div>
            </div>      
        </div>

        <div class="card">
            <h2>Top vs Bottom Students</h2>
            <div class="card-body">
                <div class="chart-col">
                    <div id="bar"></div>
                </div>
                <div class="info-col" id="bar-info">
                    </div>
            </div>
        </div>

        <div class="card">
            <h2>Environment Trend</h2>
            <div class="control" style="margin-bottom: 10px;">
                <label>Factor: </label>
                <select id="environmentSelect">
                    <option value="attendance">Attendance</option>
                    <option value="sleep_hours">Sleep Hours</option>
                    <option value="physical_activity">Physical Activity</option>
                    <option value="tutoring">Tutoring Hours</option>
                </select>
            </div>

            <div class="card-body">
                <div class="chart-col">
                    <div id="environment"></div>
                </div>
                <div class="info-col" id="environment-info">
                    <div id="environmentInsight"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Key Factors (Correlation)</h2>
            <div class="card-body">
                <div class="chart-col">
                    <div id="importance"></div>
                </div>
                <div class="info-col" id="importance-info">
                    </div>
            </div>
        </div>
    </div>
</body>

</html>
